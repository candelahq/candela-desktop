# Candela Desktop — Dart/Flutter static analysis configuration.
#
# flutter_lints provides the recommended Flutter lint rule set.
# We extend it with stricter rules for production code quality.
#
# Full rule reference: https://dart.dev/lints

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat these as errors (fail CI).
    missing_return: error
    dead_code: warning
    # Pre-existing across the codebase — suppress until bulk-fixed.
    override_on_non_overriding_member: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/gen/**"

linter:
  rules:
    # ── Style ─────────────────────────────────────────────
    prefer_single_quotes: true
    sort_child_properties_last: true
    use_full_hex_values_for_flutter_colors: true
    sized_box_for_whitespace: true

    # ── Safety ────────────────────────────────────────────
    cancel_subscriptions: true
    close_sinks: true
    no_duplicate_case_values: true
    valid_regexps: true
    use_key_in_widget_constructors: true

    # ── Code quality ──────────────────────────────────────
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_is_empty: true
    prefer_is_not_empty: true
    unnecessary_string_interpolations: true
    unnecessary_this: true
    unnecessary_const: true
    unnecessary_new: true
    # unnecessary_null_checks: Disabled — conflicts with non-promotable public fields.
    unnecessary_nullable_for_final_variable_declarations: true

    # ── Type safety ───────────────────────────────────────
    prefer_void_to_null: true

# ── Analyzer Plugins ────────────────────────────────────────
# riverpod_lint uses the native analysis_server_plugin system
# (Dart 3.10+). Registered at top level per official docs.
plugins:
  riverpod_lint: ^3.1.3
