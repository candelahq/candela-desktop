# Candela Desktop — CI Pipeline
# Runs on all PRs and pushes to main.
#
# Jobs:
#   lint — fast, Linux: format + static analysis
#   test — macOS + Linux: all widget & integration tests (headless)
#
# Note: integration tests live in test/integration/ and use the standard
# TestWidgetsFlutterBinding so they run headlessly on any CI runner.
# They do NOT require IntegrationTestWidgetsFlutterBinding or a real
# macOS display session.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib/ test/

      - name: Static analysis
        run: dart analyze --fatal-infos lib/ test/

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-linux-deps

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        if: runner.os == 'macOS'
        run: |
          if ! command -v lcov &> /dev/null; then
            brew install lcov
          fi
          # Exclude generated proto stubs from coverage calculation.
          lcov --remove coverage/lcov.info 'lib/gen/*' -o coverage/lcov.info --quiet
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' | sed 's/.*: //' | sed 's/%.*//')
          echo "Line coverage: ${COVERAGE}%"
          # Ratchet: fail if coverage drops below 45%.
          # Raise this as coverage improves.
          if (( $(echo "$COVERAGE < 45" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below minimum threshold of 45%"
            exit 1
          fi
