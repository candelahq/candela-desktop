# Candela Desktop — CI Pipeline
# Runs on all PRs and pushes to main.
#
# Jobs:
#   lint  — fast, Linux: format + static analysis
#   test  — macOS + Linux: Flutter widget/integration tests

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib/ test/

      - name: Static analysis
        run: dart analyze --fatal-infos lib/ test/

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        if: runner.os == 'macOS'
        run: |
          if ! command -v lcov &> /dev/null; then
            brew install lcov
          fi
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' | sed 's/.*: //' | sed 's/%.*//')
          echo "Line coverage: ${COVERAGE}%"
          # Fail if coverage drops below 40% (ratchet up over time).
          if (( $(echo "$COVERAGE < 40" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below minimum threshold of 40%"
            exit 1
          fi
