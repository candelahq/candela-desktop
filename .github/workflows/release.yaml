# Candela Desktop — Release Pipeline
# Builds, signs, and publishes macOS + Linux releases.
#
# Trigger: git tag vX.Y.Z  (e.g., v0.2.0)
# Beta:    git tag vX.Y.Z-beta.N (e.g., v0.2.0-beta.1)

name: Release

on:
  push:
    tags:
      - 'v*'

# Only one release at a time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # create GitHub Releases

env:
  FLUTTER_VERSION: stable

jobs:
  # ── macOS Build ──────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      # TODO: Code signing — uncomment when Apple Developer ID cert is available.
      # - name: Code sign
      #   env:
      #     MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      #     MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      #     KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
      #   run: |
      #     echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
      #     security create-keychain -p "$KEYCHAIN_PWD" build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
      #     codesign --deep --force --verify --verbose --sign "Developer ID Application: YOUR_TEAM" \
      #       build/macos/Build/Products/Release/Candela.app

      # TODO: Notarization — uncomment when Apple credentials are available.
      # - name: Notarize
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #   run: |
      #     ditto -c -k --keepParent build/macos/Build/Products/Release/Candela.app Candela-unsigned.zip
      #     xcrun notarytool submit Candela-unsigned.zip --apple-id "$APPLE_ID" \
      #       --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
      #     xcrun stapler staple build/macos/Build/Products/Release/Candela.app

      # Ad-hoc code signing — removes the Gatekeeper quarantine flag so
      # users can open the app without right-click workarounds.
      # Replace with Developer ID signing when Apple cert is available (#17).
      - name: Ad-hoc code sign
        run: |
          codesign --deep --force --sign - \
            build/macos/Build/Products/Release/Candela.app
          echo "✅ Ad-hoc signed — Gatekeeper quarantine removed"

      - name: Package zip
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent Candela.app Candela-macos-${{ matrix.arch }}.zip

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Candela Desktop" \
            --volicon "macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Candela.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "build/macos/Build/Products/Release/Candela-macos-${{ matrix.arch }}.dmg" \
            "build/macos/Build/Products/Release/Candela.app" \
            || true  # create-dmg exits 2 on "no code sign" which is expected

      - name: Sign with Sparkle EdDSA
        id: sparkle_sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        if: env.SPARKLE_PRIVATE_KEY != ''
        run: |
          ZIP_PATH="build/macos/Build/Products/Release/Candela-macos-${{ matrix.arch }}.zip"

          # Pipe the private key via stdin to avoid Keychain prompts on CI.
          # See: sign_update --help → --ed-key-file -
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | macos/Pods/Sparkle/bin/sign_update \
            --ed-key-file - "$ZIP_PATH" 2>&1) || true
          echo "sign_update output: $SIGN_OUTPUT"

          # Extract signature: sparkle:edSignature="..." length="..."
          ED_SIG=$(echo "$SIGN_OUTPUT" | grep -o 'edSignature="[^"]*"' | sed 's/edSignature="//;s/"//')
          ED_LEN=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | sed 's/length="//;s/"//')

          echo "ed_signature=${ED_SIG}" >> "$GITHUB_OUTPUT"
          echo "ed_length=${ED_LEN}" >> "$GITHUB_OUTPUT"

          # Save signature to file for artifact upload.
          mkdir -p sparkle-meta
          echo "${ED_SIG}" > sparkle-meta/signature.txt
          echo "${ED_LEN}" > sparkle-meta/length.txt
          echo "✅ Sparkle EdDSA signature: ${ED_SIG:0:20}..."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            build/macos/Build/Products/Release/Candela-macos-${{ matrix.arch }}.zip
            build/macos/Build/Products/Release/Candela-macos-${{ matrix.arch }}.dmg

      - name: Upload Sparkle signature
        if: steps.sparkle_sign.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-meta
          path: sparkle-meta/

  # ── Linux Build ──────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev

      - run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar -czf Candela-linux-x64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: build/linux/x64/release/bundle/Candela-linux-x64.tar.gz

  # ── GitHub Release ───────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release type
        id: release_type
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Sparkle appcast.xml
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          MAC_ZIP="artifacts/macos-arm64/Candela-macos-arm64.zip"
          LENGTH=$(stat -c%s "$MAC_ZIP" 2>/dev/null || stat -f%z "$MAC_ZIP")
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          # Read Sparkle EdDSA signature if available (from macOS build job).
          SIGN_ATTR=""
          if [ -f "artifacts/sparkle-meta/signature.txt" ]; then
            ED_SIG=$(cat artifacts/sparkle-meta/signature.txt)
            if [ -n "$ED_SIG" ]; then
              SIGN_ATTR="sparkle:edSignature=\"${ED_SIG}\""
              echo "✅ Including Sparkle EdDSA signature in appcast.xml"
            fi
          else
            echo "⚠️ No Sparkle signature found — appcast.xml will be unsigned"
          fi

          cat > artifacts/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Candela Desktop</title>
              <link>https://candelahq.com</link>
              <description>Candela Desktop updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>12.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/candelahq/candela-desktop/releases/download/${TAG}/Candela-macos-arm64.zip"
                  length="${LENGTH}"
                  type="application/octet-stream"
                  ${SIGN_ATTR}
                />
              </item>
            </channel>
          </rss>
          EOF
          echo "Generated appcast.xml for ${TAG} (${LENGTH} bytes)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Candela Desktop ${{ github.ref_name }}
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/*.zip
            artifacts/macos-arm64/*.dmg
            artifacts/linux-x64/*.tar.gz
            artifacts/appcast.xml

  # ── Update Homebrew Cask ──────────────────────────────────
  # Pushes an updated Casks/candela.rb to candelahq/homebrew-tap.
  #
  # TROUBLESHOOTING — if this job fails:
  #   1. Token expired/revoked → Regenerate a fine-grained PAT at:
  #      https://github.com/settings/personal-access-tokens/new
  #      Scope: candelahq/homebrew-tap, Contents: Read and Write
  #   2. Update the secret:
  #      gh secret set HOMEBREW_TAP_TOKEN --repo candelahq/candela-desktop
  #   3. Re-run this workflow (the GitHub Release is already created).
  #
  # TODO: Replace personal token with a fine-grained PAT scoped to
  #       only candelahq/homebrew-tap with Contents: Read and Write.
  #       Current token is a personal gh auth token (overpowered).
  update-homebrew-cask:
    name: Update Homebrew Cask
    needs: [release]
    runs-on: ubuntu-latest
    # Don't block the release if the cask update fails (token issues, etc).
    continue-on-error: true
    # Skip cask updates for pre-releases.
    if: ${{ !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc') }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate HOMEBREW_TAP_TOKEN
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set. The Homebrew cask will NOT be updated."
            echo "::error::To fix: create a fine-grained PAT (https://github.com/settings/personal-access-tokens/new)"
            echo "::error::Scope it to candelahq/homebrew-tap with Contents: Read and Write."
            echo "::error::Then run: gh secret set HOMEBREW_TAP_TOKEN --repo candelahq/candela-desktop"
            exit 1
          fi
          echo "✅ HOMEBREW_TAP_TOKEN is set"

      - name: Download macOS DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: artifacts

      - name: Compute SHA256 and update cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          DMG_PATH="artifacts/Candela-macos-arm64.dmg"
          SHA256=$(shasum -a 256 "$DMG_PATH" | cut -d' ' -f1)

          echo "Version: $VERSION"
          echo "SHA256:  $SHA256"

          # Clone the homebrew-tap repo.
          # If this fails, the token is likely expired or revoked.
          if ! git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/candelahq/homebrew-tap.git" tap 2>&1; then
            echo "::error::Failed to clone candelahq/homebrew-tap — HOMEBREW_TAP_TOKEN may be expired or revoked."
            echo "::error::Regenerate at: https://github.com/settings/personal-access-tokens/new"
            echo "::error::Then: gh secret set HOMEBREW_TAP_TOKEN --repo candelahq/candela-desktop"
            exit 1
          fi
          cd tap

          mkdir -p Casks

          # Generate the cask file from the template in this repo.
          sed -e "s/version \".*\"/version \"${VERSION}\"/" \
              -e "s/sha256 \".*\"/sha256 \"${SHA256}\"/" \
              ../Casks/candela.rb > Casks/candela.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/candela.rb
          git commit -m "candela ${VERSION}" || echo "No changes to commit"

          if ! git push 2>&1; then
            echo "::error::Failed to push to candelahq/homebrew-tap — HOMEBREW_TAP_TOKEN may lack write permission."
            echo "::error::Ensure the token has Contents: Read and Write on candelahq/homebrew-tap."
            exit 1
          fi

          echo "✅ Homebrew cask updated to ${VERSION}"

