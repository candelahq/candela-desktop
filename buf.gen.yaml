version: v2
plugins:
  # Protobuf message/enum Dart classes (pinned to v22 for protobuf ^4.x compat)
  - remote: buf.build/protocolbuffers/dart:v22.2.0
    out: lib/gen
    include_wkt: true
    include_imports: true
  # ConnectRPC Dart client stubs (pinned for reproducible builds)
  - remote: buf.build/connectrpc/dart:v1.0.0
    out: lib/gen
inputs:
  - module: buf.build/candelahq/protos:v0.6.0
